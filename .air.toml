root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"
env_files = ["example.env"]

[build]
pre_cmd = ["npm run build", "go tool templ generate"]
cmd = "go build -o ./tmp/short.exe ./cmd/short/main.go"
bin = "./tmp/short.exe"
entrypoint = ["./tmp/short.exe"]
delay = 1000
exclude_dir = [".git", "node_modules", "assets", "tmp", "vendor", "testdata"]
exclude_file = []
exclude_regex = ["_test.go", "_templ.go"]
exclude_unchanged = false
follow_symlink = false
full_bin = ""
include_dir = []
include_ext = ["css", "js", "go", "tpl", "tmpl", "templ", "html"]
include_file = []
kill_delay = "0s"
log = "build-errors.log"
poll = false
poll_interval = 0
rerun = false
rerun_delay = 500
send_interrupt = false
stop_on_error = false

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
main_only = false
time = false

[misc]
clean_on_exit = false

[proxy]
# To enable app should support feature toggle for csrf
enabled = false
proxy_port = 8090
app_port = 8080

[screen]
clear_on_rebuild = true
keep_scroll = false
